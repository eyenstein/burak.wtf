<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>t0kenumbers</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style>
    html,body { margin:0; padding:0; height:100%; background:#111; }
    #canvas { width:100%; height:100vh; display:block; touch-action:none; }
    @supports (-webkit-touch-callout: none) {
      #canvas { height:-webkit-fill-available; }
    }
  </style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

  <script>
    // Minimal Module config: let Emscripten load files from script's folder
    var Module = {
      canvas: function () { return document.getElementById('canvas'); }()
    };
  </script>

  <!-- iOS Safari pointer-lock polyfill (prevents crash) -->
  <script>
    if (!('exitPointerLock' in document)) {
      document.exitPointerLock = function(){};
    }
    if (!('requestPointerLock' in HTMLCanvasElement.prototype)) {
      HTMLCanvasElement.prototype.requestPointerLock = function(){};
    }
  </script>

  {{{ SCRIPT }}}

  <!-- Optional on-screen debug overlay (you can remove later) -->
  <script>
    window.addEventListener('error', function(e){
      const d=document.createElement('pre');
      d.style.cssText='position:fixed;left:0;top:0;right:0;background:#200;color:#f88;padding:8px;white-space:pre-wrap;z-index:99999;font:12px monospace';
      d.textContent='Error: '+ e.message + '\n' + (e.filename||'') + ':' + (e.lineno||'') + ':' + (e.colno||'');
      document.body.appendChild(d);
    });
    window.addEventListener('unhandledrejection', function(e){
      const d=document.createElement('pre');
      d.style.cssText='position:fixed;left:0;top:0;right:0;background:#220;color:#ff8;padding:8px;white-space:pre-wrap;z-index:99999;font:12px monospace;top:auto;bottom:0';
      d.textContent='Unhandled promise rejection: ' + (e.reason && (e.reason.stack||e.reason.message||e.reason));
      document.body.appendChild(d);
    });
  </script>
</body>
</html>
