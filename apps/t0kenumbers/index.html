<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>T0KENUMBERS</title>
<style>
  html, body { margin:0; height:100%; background:#0b1220; }
  /* Canvas her zaman görünür viewport’a göre boyutlanır */
  #canvas {
    position:fixed; top:0; left:0;
    width:100vw; height:100vh;
    display:block; touch-action:none;
  }
  /* IME sahnede dursun (klavyeye biz karışmıyoruz) */
  #ime {
    position:fixed; left:0; bottom:0;
    width:1px; height:1px; opacity:0;
    border:0; background:transparent; font-size:16px;
  }
  /* Mobil hata kutusu */
  #mobileErrorBox {
    position:fixed; left:0; right:0; bottom:0;
    background:rgba(200,0,0,0.92); color:#fff;
    font:12px/1.4 monospace; padding:6px 8px; z-index:9999;
    max-height:40vh; overflow:auto; white-space:pre-wrap;
  }
</style>
</head>
<body>
  <canvas id="canvas" tabindex="0"></canvas>
  <input id="ime" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" />

<script>
/* ---- mobil hata kutusu (sadece küçük ekranda) ---- */
(function(){
  const isMobile = matchMedia("(max-width: 768px)").matches;
  if (!isMobile) return;
  const box = document.createElement('div');
  box.id = 'mobileErrorBox';
  document.body.appendChild(box);
  const write = s => { box.textContent += (s||"")+"\n"; box.scrollTop = box.scrollHeight; };
  const ignore = m => typeof m==='string' && m.includes('emscripten_set_main_loop_timing');
  window.onerror = (m,src,l,c,e)=>{ if (!ignore(m)) write(`[JS ERROR] ${m}`); };
  window.onunhandledrejection = e => { const r=e?.reason; if (!ignore(r)) write(`[PROMISE] ${r?.stack||r}`); };
  const _err = console.error; console.error = (...a)=>{ if(!ignore(a[0])) write(a.join(' ')); _err(...a); };
})();

/* ---- refs ---- */
const canvas = document.getElementById('canvas');
const IME    = document.getElementById('ime'); // sadece sahnede dursun
window.IME   = IME;

/* ---- iOS güvenli stub’lar ---- */
if (!document.exitPointerLock) document.exitPointerLock = ()=>{};
if (!HTMLCanvasElement.prototype.requestPointerLock)
  HTMLCanvasElement.prototype.requestPointerLock = ()=>{};

/* ---- görünür viewport’a uydur ---- */
function applyViewport(){
  const dpr = window.devicePixelRatio || 1;
  const vv  = window.visualViewport;

  const cssW = Math.max(1, Math.floor(vv ? vv.width  : innerWidth));
  const cssH = Math.max(1, Math.floor(vv ? vv.height : innerHeight));
  const pxW  = Math.max(1, Math.floor(cssW * dpr));
  const pxH  = Math.max(1, Math.floor(cssH * dpr));

  if (canvas.width  !== pxW) canvas.width  = pxW;
  if (canvas.height !== pxH) canvas.height = pxH;

  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';

  // iOS zoom/klavye offset düzeltmesi
  const offX = vv ? vv.offsetLeft : 0;
  const offY = vv ? vv.offsetTop  : 0;
  const t = `translate(${-offX}px, ${-offY}px)`;
  canvas.style.transform = t;
  IME.style.transform    = t;
}
applyViewport();
addEventListener('resize', applyViewport);
addEventListener('orientationchange', applyViewport);
if (window.visualViewport) {
  visualViewport.addEventListener('resize', applyViewport);
  visualViewport.addEventListener('scroll',  applyViewport);
}

/* ---- canvas odak (mevcut davranışı koru) ---- */
function focusCanvas(){ try{ canvas.focus({preventScroll:true}); }catch(e){} }
canvas.addEventListener('mousedown',  focusCanvas);
canvas.addEventListener('touchstart', focusCanvas, {passive:true});

/* ---- Emscripten Module ---- */
const VER = "2025-09-18-viewport-v3"; // cache-bust
window.Module = {
  canvas,
  locateFile: p => p + (p.endsWith('.wasm') ? ('?v='+VER) : ''),
  onRuntimeInitialized(){
    focusCanvas();
    applyViewport(); // garanti
  },
  print:    t => console.log(t),
  printErr: t => console.error(t),
};
</script>

<!-- tek JS include — JS ve WASM aynı versiyon -->
<script src="./t0kenumbers.js?v=2025-09-18-viewport-v3"></script>
</body>
</html>
