<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>T0KENUMBERS</title>
<style>
  /* Sayfa */
  html, body { margin:0; height:100%; background:#0b1220; }
  /* Canvas: her zaman ekranın sol–üstüne sabitlenir, yüksekliği görünür alana uyar */
  #canvas {
    position:fixed; top:0; left:0;
    width:100vw; height:100vh;  /* JS’te gerçek piksele (width/height) set ediliyor */
    display:block; touch-action:none;
  }
  /* IME: sahnede ama görünmez — klavye açmak için */
  #ime {
    position:fixed; left:0; bottom:0; width:1px; height:1px;
    opacity:0; border:0; background:transparent; font-size:16px;
  }

  /* Mobil hata kutusu (yalnızca küçük ekranlarda açarız) */
  #mobileErrorBox {
    position:fixed; left:0; right:0; bottom:0;
    background:rgba(200,0,0,0.92); color:#fff;
    font:12px/1.4 monospace; padding:6px 8px; z-index:9999;
    max-height:40vh; overflow:auto; white-space:pre-wrap;
  }
</style>
</head>
<body>
  <canvas id="canvas" tabindex="0"></canvas>
  <input id="ime" type="text" inputmode="text" autocomplete="off"
         autocapitalize="off" autocorrect="off" />

<script>
  // ---------- Mobil hata kutusu (yalnızca mobil) ----------
  (function(){
    const isMobile = matchMedia("(max-width: 768px)").matches;
    if (!isMobile) return;
    const box = document.createElement('div');
    box.id = 'mobileErrorBox';
    document.body.appendChild(box);
    const write = (s)=>{ box.textContent += (s||"")+"\n"; box.scrollTop = box.scrollHeight; };
    const e2s = (e)=> e?.stack || e;
    window.onerror = (m,src,l,c,e)=> write("[JS ERROR] "+m+" @"+(src||"")+":"+l+":"+c+"\n"+e2s(e));
    window.onunhandledrejection = (e)=> write("[PROMISE] "+e2s(e.reason));
    const _log = console.log, _err = console.error, _warn = console.warn;
    console.log = (...a)=>{ write(a.join(" ")); _log(...a); };
    console.error = (...a)=>{ write(a.join(" ")); _err(...a); };
    console.warn = (...a)=>{ write(a.join(" ")); _warn(...a); };
  })();

  // ---------- Canvas & IME refs ----------
  const canvas = document.getElementById('canvas');
  const IME    = document.getElementById('ime');
  window.IME   = IME; // C++ EM_ASM erişimi

  // iOS güvenli stub’lar
  if (!document.exitPointerLock) document.exitPointerLock = ()=>{};
  if (!HTMLCanvasElement.prototype.requestPointerLock)
    HTMLCanvasElement.prototype.requestPointerLock = ()=>{};

  // Görünür viewport’a göre canvas’ı piksel doğruluğunda boyutla (klavye dahil)
  function fitCanvasToViewport(){
    const dpr = window.devicePixelRatio || 1;
    // VisualViewport varsa onu kullan (klavye açıldığında doğru yüksekliği verir)
    const vv = window.visualViewport;
    const cssW = Math.max(1, Math.floor((vv ? vv.width  : innerWidth)));
    const cssH = Math.max(1, Math.floor((vv ? vv.height : innerHeight)));
    const w = Math.max(1, Math.floor(cssW * dpr));
    const h = Math.max(1, Math.floor(cssH * dpr));
    if (canvas.width  !== w) canvas.width  = w;
    if (canvas.height !== h) canvas.height = h;

    // Canvas elementinin CSS yüksekliğini de görünür alana sabitle
    canvas.style.width  = cssW + "px";
    canvas.style.height = cssH + "px";
  }
  fitCanvasToViewport();

  // Klavye/zoom/rotate değişimlerini yakala
  addEventListener('resize', fitCanvasToViewport);
  addEventListener('orientationchange', fitCanvasToViewport);
  if (window.visualViewport) {
    visualViewport.addEventListener('resize', fitCanvasToViewport);
    visualViewport.addEventListener('scroll',  fitCanvasToViewport);
  }

  // Canvas odak
  function focusCanvas(){ try{ canvas.focus({preventScroll:true}); }catch(e){} }
  canvas.addEventListener('mousedown',  focusCanvas);
  canvas.addEventListener('touchstart', focusCanvas, {passive:true});

  // ---- IME yalnızca KLAVYE AÇMAK için: karakter göndermiyoruz (çift yazmayı engeller) ----
  // Runtime hazır olmadan cwrap/ccall kullanmayacağız.
  let wantText = null;

  const VER = "2025-09-18-viewport"; // cache-bust
  window.Module = {
    canvas,
    locateFile: (p)=> p + (p.endsWith('.wasm') ? ('?v='+VER) : ''),
    onRuntimeInitialized(){
      try { wantText = Module.cwrap('imgui_want_text','number',[]); } catch(e) { console.error(e); }
      focusCanvas();
      // İlk init’te de boyut doğru olsun
      fitCanvasToViewport();
    },
    print:    (t)=>console.log(t),
    printErr: (t)=>console.error(t),
  };

  // Kullanıcı dokunurken ImGui input istiyorsa IME’yi odakla → mobil klavye açılır
  ['touchstart','mousedown'].forEach(ev =>
    canvas.addEventListener(ev, ()=>{
      if (wantText && wantText()===1) {
        try {
          IME.focus({preventScroll:true});
          const v = IME.value || "";
          IME.setSelectionRange(v.length, v.length);
        } catch(e){}
      }
    }, {passive:true})
  );
</script>

<!-- Tek JS include: JS ve WASM aynı VER ile -->
<script src="./t0kenumbers.js?v=2025-09-18-viewport"></script>
</body>
</html>
