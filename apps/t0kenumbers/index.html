<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>T0KENUMBERS</title>
<style>
  html, body { margin:0; height:100%; background:#0b1220; overflow:hidden; }
  #viewport {
    position:fixed; inset:0;
    overflow:hidden;
    touch-action:none;
    user-select:none;
  }
  #stage {
    position:absolute; top:0; left:0;
    width:100vw; height:100vh;
    transform-origin: 0 0;
    will-change: transform;
  }
  #canvas { display:block; width:100vw; height:100vh; }
  #ime {
    position:fixed; bottom:0; left:0;
    width:1px; height:1px; opacity:0;
    border:0; background:transparent; font-size:16px;
  }
</style>
</head>
<body>
  <div id="viewport">
    <div id="stage">
      <canvas id="canvas" tabindex="0"></canvas>
    </div>
  </div>
  <input id="ime" type="text" inputmode="text" autocomplete="off"
         autocapitalize="off" autocorrect="off" />

<script>
  const viewport = document.getElementById('viewport');
  const stage    = document.getElementById('stage');
  const canvas   = document.getElementById('canvas');
  const IME      = document.getElementById('ime');
  window.IME     = IME;

  // --- framebuffer ---
  function fitCanvas(){
    const dpr = window.devicePixelRatio || 1;
    const w = Math.max(1, Math.floor(innerWidth  * dpr));
    const h = Math.max(1, Math.floor(innerHeight * dpr));
    if (canvas.width!==w)  canvas.width  = w;
    if (canvas.height!==h) canvas.height = h;
  }
  fitCanvas();
  addEventListener('resize', fitCanvas);
  addEventListener('orientationchange', fitCanvas);

  if (!document.exitPointerLock) document.exitPointerLock = ()=>{};
  if (!HTMLCanvasElement.prototype.requestPointerLock)
    HTMLCanvasElement.prototype.requestPointerLock = ()=>{};

  function focusCanvas(){ try{ canvas.focus({preventScroll:true}); }catch(_){} }
  canvas.addEventListener('mousedown',  focusCanvas);
  canvas.addEventListener('touchstart', focusCanvas, {passive:true});

  // runtime hazır olmadan cwrap yok
  let wantText = null;
  const VER = "2025-09-18-zoom-pan"; // cache-bust
  window.Module = {
    canvas,
    locateFile: (p)=> p + (p.endsWith('.wasm') ? ('?v='+VER) : ''),
    onRuntimeInitialized(){
      try { wantText = Module.cwrap('imgui_want_text','number',[]); } catch(_) {}
      focusCanvas();
    },
    print:    (t)=>console.log(t),
    printErr: (t)=>console.error(t),
  };

  // IME focus
  ['touchstart','mousedown'].forEach(ev =>
    canvas.addEventListener(ev, ()=>{
      if (wantText && wantText()===1) {
        try {
          IME.focus({preventScroll:true});
          const v = IME.value||"";
          IME.setSelectionRange(v.length, v.length);
        } catch(_){}
      }
    }, {passive:true})
  );

  // ---- Zoom & Pan ----
  const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  let scale = 1, tx = 0, ty = 0;
  const MIN_SCALE = 0.6, MAX_SCALE = 3.0;

  function vpSize(){ return { w: viewport.clientWidth, h: viewport.clientHeight }; }

  function clampPan(){
    const {w, h} = vpSize();
    const sw = w * scale, sh = h * scale;
    if (scale <= 1) {
      tx = (w - sw) * 0.5;
      ty = (h - sh) * 0.5;
    } else {
      const minX = w - sw, maxX = 0;
      const minY = h - sh, maxY = 0;
      if (tx < minX) tx = minX;
      if (tx > maxX) tx = maxX;
      if (ty < minY) ty = minY;
      if (ty > maxY) ty = maxY;
    }
  }

  function applyTransform(){
    clampPan();
    stage.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  }
  applyTransform();

  const dist2 = (a,b)=> {
    const dx = a.clientX - b.clientX, dy = a.clientY - b.clientY;
    return Math.sqrt(dx*dx + dy*dy);
  };

  if (isTouch) {
    let mode = null;
    let panStart = {x:0,y:0,tx0:0,ty0:0};
    let pinchStart = {d:1, scale0:1, tx0:0, ty0:0, cx:0, cy:0};

    viewport.addEventListener('touchstart', e=>{
      if (e.touches.length===1) {
        if (scale>1) {
          mode = 'pan';
          const t=e.touches[0];
          panStart={x:t.clientX,y:t.clientY,tx0:tx,ty0:ty};
        }
      } else if (e.touches.length>=2) {
        mode='pinch';
        const a=e.touches[0], b=e.touches[1];
        pinchStart.d = dist2(a,b)||1;
        pinchStart.scale0=scale;
        pinchStart.tx0=tx; pinchStart.ty0=ty;
        pinchStart.cx=(a.clientX+b.clientX)/2;
        pinchStart.cy=(a.clientY+b.clientY)/2;
      }
    },{passive:false});

    viewport.addEventListener('touchmove', e=>{
      if (mode==='pan' && e.touches.length===1) {
        e.preventDefault();
        const t=e.touches[0];
        tx = panStart.tx0 + (t.clientX-panStart.x);
        ty = panStart.ty0 + (t.clientY-panStart.y);
        applyTransform();
      } else if (mode==='pinch' && e.touches.length>=2) {
        e.preventDefault();
        const a=e.touches[0], b=e.touches[1];
        const d=dist2(a,b);
        let newScale=pinchStart.scale0*(d/pinchStart.d);
        newScale=Math.max(MIN_SCALE,Math.min(MAX_SCALE,newScale));
        const k=newScale/pinchStart.scale0;
        tx=pinchStart.cx-((pinchStart.cx-pinchStart.tx0)*k);
        ty=pinchStart.cy-((pinchStart.cy-pinchStart.ty0)*k);
        scale=newScale;
        applyTransform();
      }
    },{passive:false});

    viewport.addEventListener('touchend', e=>{
      if (e.touches.length===0) mode=null;
      else if (e.touches.length===1 && scale>1) {
        const t=e.touches[0];
        mode='pan'; panStart={x:t.clientX,y:t.clientY,tx0:tx,ty0:ty};
      } else mode=null;
    },{passive:false});
  }
</script>

<script src="./t0kenumbers.js?v=2025-09-18-zoom-pan"></script>
</body>
</html>
