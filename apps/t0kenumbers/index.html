<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>T0KENUMBERS</title>
<style>
  html,body { margin:0; height:100%; background:#0b1220; overscroll-behavior:none; }
  #canvas { display:block; width:100vw; height:100vh; touch-action:none; }
</style>
</head>
<body>
  <canvas id="canvas" tabindex="0"></canvas>

  <script>
    // Canvas & boyut
    const canvas = document.getElementById('canvas');
    function fitCanvasToWindow() {
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(1, Math.floor(innerWidth  * dpr));
      const h = Math.max(1, Math.floor(innerHeight * dpr));
      if (canvas.width  !== w) canvas.width  = w;
      if (canvas.height !== h) canvas.height = h;
    }
    fitCanvasToWindow();
    addEventListener('resize', fitCanvasToWindow);
    addEventListener('orientationchange', fitCanvasToWindow);

    // Odak
    function focusCanvas(){ canvas.focus({preventScroll:true}); }
    canvas.addEventListener('mouseenter', focusCanvas);
    canvas.addEventListener('mousedown',  focusCanvas);
    canvas.addEventListener('touchstart', focusCanvas, { passive:true });

    // Hata overlay
    function showErr(msg){
      let div = document.getElementById('errlog');
      if(!div){
        div = document.createElement('div');
        Object.assign(div.style, {
          position:'fixed', left:'0', right:'0', bottom:'0',
          maxHeight:'40%', overflow:'auto',
          background:'rgba(0,0,0,.85)', color:'#f55',
          font:'12px/1.4 monospace', padding:'6px 8px', zIndex:9999
        });
        div.id = 'errlog';
        document.body.appendChild(div);
      }
      div.textContent += (msg + "\n");
    }
    // Global JS hataları da yakala (mobilde çok işe yarar)
    addEventListener('error', e => showErr('JS error: ' + e.message));
    addEventListener('unhandledrejection', e => showErr('Promise: ' + (e.reason && e.reason.message || e.reason)));

    // Emscripten Module — TEK tanım!
    window.Module = {
      canvas,
      locateFile: (p)=>p,
      onRuntimeInitialized(){ focusCanvas(); },
      print:    (t)=>showErr(String(t)),
      printErr: (t)=>showErr(String(t)),
    };
  </script>
  <script>
    // iOS Safari'de pointer lock yok → stub
    if (typeof document.exitPointerLock !== "function") {
      document.exitPointerLock = function() {
        console.log("exitPointerLock not supported on this platform");
      };
    }
    if (typeof document.requestPointerLock !== "function") {
      HTMLCanvasElement.prototype.requestPointerLock = function() {
        console.log("requestPointerLock not supported on this platform");
      };
    }
  </script>
  <!-- WASM -->
  <script src="./t0kenumbers.js"></script>
</body>
</html>
