<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>T0kenumbers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    html,body { margin:0; padding:0; height:100%; }
    #app {
      min-height: 100%;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: none; /* canvas/gesture için faydalı */
    }
    .hidden { display:none; }
    #error {
      position: fixed; inset: 0; background: rgba(0,0,0,.8);
      color: #fff; padding: 16px; font-family: system-ui, sans-serif; overflow: auto;
    }
    #error pre { white-space: pre-wrap; word-break: break-word; }
  </style>
  <!-- Köke göre ver (kendi yapına göre düzelt): -->
  <script src="/wasm-src/t0kenumbers.js" defer></script>
  <script>
    // Basit hata yakalama (telefonda göstersin)
    window.addEventListener('error', e => showErr(e.error ? (e.error.stack || e.error) : e.message));
    window.addEventListener('unhandledrejection', e => showErr(e.reason && e.reason.stack ? e.reason.stack : (e.reason || 'unhandled rejection')));
    function showErr(msg){
      const box = document.getElementById('error');
      box.classList.remove('hidden');
      box.querySelector('pre').textContent = String(msg);
    }
    // Script yüklenemediyse (404/MIME) uyar:
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        if (!window.Module) {
          showErr('WASM/JS yüklenemedi. Olası nedenler:\n- Yanlış yol (script src)\n- .wasm MIME yanlış (application/wasm olmalı)\n- COOP/COEP header’ları eksik (pthreads/SharedArrayBuffer kullanıyorsan)\n- Farklı origin / CORS');
        }
      }, 1500);
    });
  </script>
</head>
<body>
  <div id="app">
    <h1>T0kenumbers</h1>
  </div>
  <div id="error" class="hidden">
    <h2>Hata</h2>
    <pre></pre>
  </div>
</body>
</html>
