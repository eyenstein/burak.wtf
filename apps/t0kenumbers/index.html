<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>T0KENUMBERS</title>
<style>
  html, body { margin:0; height:100%; background:#0b1220; overscroll-behavior:none; }

  /* Uygulama penceresi: sayfayı sabitler, kendi içinde zoom/pan yapar */
  #viewport {
    position:fixed; inset:0;          /* top:0; right:0; bottom:0; left:0 */
    overflow:hidden;                  /* sayfa değil, sadece bu kutu görünür */
    touch-action:none;                /* kendi gesturelarımızı kullanacağız */
  }

  /* Zoom/Pan sahnesi: transform burada uygulanır (canvas’a değil) */
  #stage {
    position:absolute; top:0; left:0;
    width:100vw; height:100vh;
    transform-origin: 0 0;            /* sol-üst referans */
    will-change: transform;
  }

  /* Canvas framebuffer: içeriği çiziyoruz; boyutu JS’te DPR ile set */
  #canvas {
    display:block; width:100vw; height:100vh;
  }

  /* IME sahnede dursun (off-screen yapma) → bazı tarayıcılar aksi halde klavye açmıyor */
  #ime {
    position:fixed; bottom:0; left:0;
    width:1px; height:1px; opacity:0;
    border:0; background:transparent; font-size:16px;
  }
</style>
</head>
<body>
  <div id="viewport">
    <div id="stage">
      <canvas id="canvas" tabindex="0"></canvas>
    </div>
  </div>
  <input id="ime" type="text" inputmode="text" autocomplete="off" autocapitalize="off" autocorrect="off" />

<script>
  // ---- refs ----
  const viewport = document.getElementById('viewport');
  const stage    = document.getElementById('stage');
  const canvas   = document.getElementById('canvas');
  const IME      = document.getElementById('ime');
  window.IME     = IME; // C++ EM_ASM için

  // Canvas framebuffer’ı ekran pikseline göre ayarla
  function fitCanvas(){
    const dpr = window.devicePixelRatio || 1;
    const w = Math.max(1, Math.floor(innerWidth  * dpr));
    const h = Math.max(1, Math.floor(innerHeight * dpr));
    if (canvas.width!==w)  canvas.width  = w;
    if (canvas.height!==h) canvas.height = h;
  }
  fitCanvas();
  addEventListener('resize', fitCanvas);
  addEventListener('orientationchange', fitCanvas);

  // Güvenli stub'lar
  if (!document.exitPointerLock) document.exitPointerLock = ()=>{};
  if (!HTMLCanvasElement.prototype.requestPointerLock)
    HTMLCanvasElement.prototype.requestPointerLock = ()=>{};

  // Çalışan sürümdeki odak/IME davranışı birebir korunuyor:
  function focusCanvas(){ try{ canvas.focus({preventScroll:true}); }catch(_){} }
  canvas.addEventListener('mousedown',  focusCanvas);
  canvas.addEventListener('touchstart', focusCanvas, {passive:true});

  // ❗ IME sadece klavye açmak için; karakteri IMGUI/GLFW alır (çift yazma yok)
  let wantText = null;

  const VER = "2025-09-18-zoom-pan-contained"; // cache-bust
  window.Module = {
    canvas,
    locateFile: (p)=> p + (p.endsWith('.wasm') ? ('?v='+VER) : ''),
    onRuntimeInitialized(){
      try { wantText = Module.cwrap('imgui_want_text','number',[]); } catch(_) {}
      focusCanvas();
    },
    print:    (t)=>console.log(t),
    printErr: (t)=>console.error(t),
  };

  // Kullanıcı DOKUNURKEN ImGui text istiyorsa → IME'yi odakla (klavye aç)
  ['touchstart','mousedown'].forEach(ev =>
    canvas.addEventListener(ev, ()=>{
      if (wantText && wantText()===1) {
        try {
          IME.focus({preventScroll:true});
          const v = IME.value||"";
          IME.setSelectionRange(v.length, v.length);
        } catch(_){}
      }
    }, {passive:true})
  );

  // -------------------------
  //  Pinch-Zoom & Pan (sadece viewport içinde)
  //  - Zoom out: sahne otomatik ortalanır, pan kilitlenir (scroll yok, tamamı görünür)
  //  - Zoom in: pan serbest ama sınırlandırılmış (sahne dışına çıkmaz)
  //  - Masaüstü: mouse ile pan/drag YOK, normal scroll/scrollbar davranışı bozulmaz
  //  - Trackpad ctrl+wheel ile zoom (isteğe bağlı) ekli, normal wheel’i engellemiyoruz
  // -------------------------
  let scale = 1;
  let tx = 0, ty = 0;
  const MIN_SCALE = 0.6;
  const MAX_SCALE = 3.0;

  function viewportSize(){
    // viewport’un CSS boyutu (px)
    return { w: viewport.clientWidth, h: viewport.clientHeight };
  }

  function clampPan(){
    const {w, h} = viewportSize();
    const sw = w * scale, sh = h * scale;

    if (scale <= 1) {
      // Zoom out: tamamını göster, ortala ve pan’ı kilitle
      tx = (w - sw) * 0.5;
      ty = (h - sh) * 0.5;
    } else {
      // Zoom in: sahneyi viewport içinde tut (boşluk bırakma)
      const minX = w - sw, maxX = 0;
      const minY = h - sh, maxY = 0;
      if (tx < minX) tx = minX;
      if (tx > maxX) tx = maxX;
      if (ty < minY) ty = minY;
      if (ty > maxY) ty = maxY;
    }
  }

  function applyTransform(){
    clampPan();
    stage.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  }
  applyTransform();

  // Yardımcılar
  const dist2 = (a,b)=> {
    const dx = a.clientX - b.clientX, dy = a.clientY - b.clientY;
    return Math.sqrt(dx*dx + dy*dy);
  };
  const midPt = (a,b)=> ({ x:(a.clientX+b.clientX)/2, y:(a.clientY+b.clientY)/2 });

  // Durum
  let touchMode = null; // 'pan' | 'pinch'
  let panStart = {x:0, y:0, tx0:0, ty0:0};
  let pinchStart = {d:0, scale0:1, center:{x:0,y:0}, tx0:0, ty0:0};

  // Sadece dokunma (mobil) için gesture’lar — mouse’u engellemiyoruz
  viewport.addEventListener('touchstart', (e)=>{
    if (e.touches.length === 1) {
      // Tek parmak pan sadece zoom in’de aktif
      if (scale > 1) {
        touchMode = 'pan';
        const t = e.touches[0];
        panStart = { x:t.clientX, y:t.clientY, tx0:tx, ty0:ty };
      } else {
        touchMode = null; // scale<=1 iken pan yok
      }
    } else if (e.touches.length >= 2) {
      // İki parmak pinch-zoom
      touchMode = 'pinch';
      const a = e.touches[0], b = e.touches[1];
      pinchStart.d = dist2(a,b) || 1;
      pinchStart.scale0 = scale;
      pinchStart.center = midPt(a,b);
      pinchStart.tx0 = tx; pinchStart.ty0 = ty;
    }
  }, {passive:false});

  viewport.addEventListener('touchmove', (e)=>{
    if (touchMode === 'pan' && e.touches.length === 1) {
      e.preventDefault();
      const t = e.touches[0];
      const dx = t.clientX - panStart.x;
      const dy = t.clientY - panStart.y;
      tx = panStart.tx0 + dx;
      ty = panStart.ty0 + dy;
      applyTransform();
    } else if (touchMode === 'pinch' && e.touches.length >= 2) {
      e.preventDefault();
      const a = e.touches[0], b = e.touches[1];
      const d = dist2(a,b);
      if (pinchStart.d > 0) {
        let newScale = pinchStart.scale0 * (d / pinchStart.d);
        newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));

        // Zoom’u pinch merkezine sabitle (cx, cy)
        const cx = pinchStart.center.x, cy = pinchStart.center.y;
        const k = newScale / pinchStart.scale0;

        // (cx - tx)/scale sabit kalsın → pan düzeltmesi:
        tx = cx - ( (cx - pinchStart.tx0) * k );
        ty = cy - ( (cy - pinchStart.ty0) * k );

        scale = newScale;
        applyTransform();
      }
    }
  }, {passive:false});

  viewport.addEventListener('touchend', (e)=>{
    if (e.touches.length === 0) {
      touchMode = null;
    } else if (e.touches.length === 1) {
      // İki parmaktan bire düştü → pan’e geç (sadece scale>1 ise)
      const t = e.touches[0];
      if (scale > 1) {
        touchMode = 'pan';
        panStart = { x:t.clientX, y:t.clientY, tx0:tx, ty0:ty };
      } else {
        touchMode = null;
      }
    }
  }, {passive:false});

  // Çift dokunuşta reset (opsiyonel)
  let lastTap = 0;
  viewport.addEventListener('touchend', ()=>{
    const now = performance.now();
    if (now - lastTap < 300) { // double tap
      scale = 1; tx = 0; ty = 0;
      applyTransform();
    }
    lastTap = now;
  }, {passive:true});

  // Masaüstü: normal wheel/scrollbar davranışını bozma.
  // Sadece ctrl+wheel ile nazik zoom (trackpad pinch eşleniği)
  viewport.addEventListener('wheel', (e)=>{
    if (e.ctrlKey) {
      e.preventDefault();
      const {w,h} = viewportSize();
      const cx = e.clientX, cy = e.clientY;
      const scale0 = scale;
      let newScale = scale * Math.pow(1.0015, -e.deltaY);
      newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
      const k = newScale / scale0;

      // Fare konumu etrafında zoom
      tx = cx - ( (cx - tx) * k );
      ty = cy - ( (cy - ty) * k );
      scale = newScale;
      applyTransform();
    }
    // ctrl değilse engelleme → ImGui scrollbar/wheel normal çalışır
  }, {passive:false});

  // Pencere boyutu değişince transformu tekrar sınırla
  addEventListener('resize', applyTransform);
  addEventListener('orientationchange', applyTransform);
</script>

<!-- tek JS include — JS ve WASM aynı versiyon -->
<script src="./t0kenumbers.js?v=2025-09-18-zoom-pan-contained"></script>
</body>
</html>
