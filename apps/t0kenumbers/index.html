<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>T0KENUMBERS</title>
<style>
  html, body { margin:0; height:100%; background:#0b1220; overscroll-behavior:none; }
  #canvas { display:block; width:100vw; height:100vh; touch-action:none; }
  #ime {
    position:fixed; bottom:0; left:0;
    width:1px; height:1px; opacity:0;
    border:0; background:transparent; font-size:16px;
  }
  #mobileErrorBox {
    position:fixed; bottom:0; left:0; right:0;
    background:rgba(200,0,0,0.92); color:#fff;
    font:12px/1.4 monospace; padding:6px 8px; z-index:9999;
    max-height:40vh; overflow:auto; white-space:pre-wrap;
  }
</style>
</head>
<body>
  <canvas id="canvas" tabindex="0"></canvas>
  <input id="ime" type="text" inputmode="text" autocomplete="off"
         autocapitalize="off" autocorrect="off" />

  <script>
    const canvas = document.getElementById('canvas');
    const IME    = document.getElementById('ime');
    window.IME   = IME;

    // Hata kutusu (mobilde)
    (function(){
      const isMobile = window.matchMedia("(max-width: 768px)").matches;
      if (!isMobile) return;
      const box = document.createElement('div');
      box.id = 'mobileErrorBox';
      document.body.appendChild(box);
      function writeLine(s){
        box.textContent += (s||"") + "\n";
        box.scrollTop = box.scrollHeight;
      }
      window.onerror = (m,s,l,c,e)=>{ writeLine("[JS ERROR] " + m); };
      window.onunhandledrejection = e=>{ writeLine("[PROMISE] " + e.reason); };
      const origErr = console.error;
      console.error = (...a)=>{ writeLine(a.join(" ")); origErr.apply(console,a); };
    })();

    // Canvas boyut
    function fitCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = Math.floor(window.innerWidth  * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
    }
    fitCanvas();
    addEventListener('resize', fitCanvas);
    addEventListener('orientationchange', fitCanvas);

    // PointerLock stub
    if (!document.exitPointerLock) document.exitPointerLock = ()=>{};
    if (!HTMLCanvasElement.prototype.requestPointerLock)
        HTMLCanvasElement.prototype.requestPointerLock = ()=>{};

    // Canvas focus
    function focusCanvas(){ try{ canvas.focus({preventScroll:true}); }catch(e){} }
    canvas.addEventListener('mousedown', focusCanvas);
    canvas.addEventListener('touchstart', focusCanvas,{passive:true});

    // IME → C++
    IME.addEventListener('input', ()=>{
      const s = IME.value;
      if (s && window.Module && Module.ccall) {
        Module.ccall('ime_send', null, ['string'], [s]);
        IME.value = '';
      }
    });

    // Runtime
    const VER = "2025-09-18-11";
    window.Module = {
      canvas,
      locateFile: (p)=> p + (p.endsWith('.wasm') ? "?v="+VER : ""),
      onRuntimeInitialized(){ focusCanvas(); },
      print: (t)=>console.log(t),
      printErr: (t)=>console.error(t),
    };
  </script>

  <script src="./t0kenumbers.js?v=2025-09-18-11"></script>
</body>
</html>
