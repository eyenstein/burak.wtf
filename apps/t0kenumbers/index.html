<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>t0kenumbers</title>
<style>
  body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
       background:#0b0f1a;font:14px monospace;color:#eee}
  .window{background:#101624;border:2px solid #1f2a3d;border-radius:6px;
          width:460px;box-shadow:0 0 20px rgba(0,0,0,.6)}
  .titlebar{background:#182235;padding:6px 10px;font-weight:bold;font-size:13px;
            border-bottom:1px solid #1f2a3d}
  .content{padding:14px;display:flex;flex-direction:column;gap:10px}
  label{display:flex;justify-content:space-between;align-items:center;gap:8px}
  input[type="text"],input[type="number"]{
    flex:1;background:#131b2c;border:1px solid #24314a;border-radius:4px;
    color:#eee;padding:6px;font:14px monospace;
  }
  input:disabled{opacity:.5}
  .row{display:flex;gap:8px}
  .row > *{flex:1}
  .checkbox{display:flex;align-items:center;gap:6px}
  .muted{opacity:.75;font-size:12px}
  .result{margin-top:8px;padding:8px;background:#131b2c;border:1px solid #24314a;
          border-radius:4px;font-size:13px;line-height:1.4}
</style>
<body>
  <div class="window">
    <div class="titlebar">t0kenumbers</div>
    <div class="content">

      <label>Name <input id="name" type="text" value="demo"></label>

      <div class="row">
        <label>Price <input id="price" type="number" step="any" value="1"></label>
        <label>MCAP (FDV) <input id="mcap" type="number" step="any" value="1000"></label>
      </div>

      <label>Normal Supply <input id="supply" type="number" step="any" value="1000"></label>

      <div class="checkbox">
        <input id="premOn" type="checkbox">
        <label for="premOn">Enable premine</label>
      </div>

      <div class="row">
        <label>Premine % <input id="premPct" type="number" step="any" value="0" disabled></label>
        <label>Premine Amount <input id="premAmt" type="number" step="any" value="0" disabled></label>
      </div>
      <div class="muted">FDV = price × gross, gross = supply + (premine_on ? premine_amount : 0)</div>

      <div class="result" id="out"></div>
    </div>
  </div>

<script>
(() => {
  const el = id => document.getElementById(id);

  let lastEdited = "price";     // "price" | "mcap"
  let lastPrem   = "pct";       // "pct" | "amt"

  const name    = el("name");
  const price   = el("price");
  const mcap    = el("mcap");
  const supply  = el("supply");
  const premOn  = el("premOn");
  const premPct = el("premPct");
  const premAmt = el("premAmt");
  const out     = el("out");

  function num(v){ const x = parseFloat(v); return Number.isFinite(x) ? x : 0; }

  function compute() {
    // read
    const pOn  = premOn.checked;
    let sup    = Math.max(0, num(supply.value));
    let pct    = Math.max(0, num(premPct.value));
    let amt    = Math.max(0, num(premAmt.value));
    let P      = Math.max(0, num(price.value));
    let M      = Math.max(0, num(mcap.value));

    // sync premine fields according to last edited prem field
    if (!pOn) { pct = 0; amt = 0; }
    else {
      if (lastPrem === "pct") {
        amt = sup > 0 ? sup * (pct/100) : 0;
        premAmt.value = trimNum(amt);
      } else { // lastPrem === "amt"
        pct = sup > 0 ? (amt / sup) * 100 : 0;
        premPct.value = trimNum(pct);
      }
    }

    // supply & gross
    const prem_add = pOn ? amt : 0;
    const gross    = sup + prem_add;

    // resolve price/mcap depending on lastEdited
    if (lastEdited === "mcap") {
      P = gross > 0 ? (M / gross) : 0;
      price.value = trimNum(P);
    } else { // "price"
      M = P * gross;
      mcap.value = trimNum(M);
    }

    // output
    out.innerHTML =
      `name: ${escapeHtml(name.value)}<br>`+
      `gross supply: ${trimNum(gross)}<br>`+
      `circulating supply: ${trimNum(gross)}<br>`+
      (pOn ? `premine amount: ${trimNum(amt)} &nbsp; (premine %: ${trimNum(pct)})<br>` : ``) +
      `FDV (MCAP): ${trimNum(M)}<br>`+
      `price: ${trimNum(P)}`;
    
    // enable/disable prem fields
    premPct.disabled = !pOn;
    premAmt.disabled = !pOn;
  }

  function trimNum(n){
    // okunur kısa sayı formatı
    const s = Number(n);
    if (!Number.isFinite(s)) return "0";
    // büyük sayılarda gereksiz ondalıkları kırp
    const abs = Math.abs(s);
    const decimals = abs >= 1e6 ? 2 : abs >= 1e3 ? 4 : 8;
    return s.toLocaleString(undefined, {maximumFractionDigits: decimals});
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, m =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])
    );
  }

  // events
  name.addEventListener("input", compute);

  price.addEventListener("input", () => { lastEdited = "price"; compute(); });
  mcap .addEventListener("input", () => { lastEdited = "mcap";  compute(); });

  supply.addEventListener("input", compute);
  premOn.addEventListener("change", compute);

  premPct.addEventListener("input", () => { lastPrem = "pct"; compute(); });
  premAmt.addEventListener("input", () => { lastPrem = "amt"; compute(); });

  // init
  compute();
})();
</script>
</body>
</html>
