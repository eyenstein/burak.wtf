<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>T0KENUMBERS</title>
<style>
  html,body { margin:0; height:100%; background:#0b1220; overscroll-behavior:none; }
  #canvas { display:block; width:100vw; height:100vh; touch-action:none; }
</style>
</head>
<body>
    <canvas id="canvas" tabindex="0"></canvas>
    <input id="ime" type="text" inputmode="text" autocomplete="off" autocapitalize="off" autocorrect="off"
      style="position:fixed;left:-9999px;width:1px;height:1px;opacity:0.01;border:0;background:transparent;font-size:16px;" />

  <script>
    // Canvas ve DPR boyutlama
    const canvas = document.getElementById('canvas');
    function fitCanvasToWindow() {
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(1, Math.floor(window.innerWidth  * dpr));
      const h = Math.max(1, Math.floor(window.innerHeight * dpr));
      if (canvas.width  !== w) canvas.width  = w;
      if (canvas.height !== h) canvas.height = h;
    }
    fitCanvasToWindow();
    addEventListener('resize', fitCanvasToWindow);
    addEventListener('orientationchange', fitCanvasToWindow);

    // Pointer lock mobilde yoksa stub'la (iOS crash engeli)
    if (typeof document.exitPointerLock !== "function") {
      document.exitPointerLock = function(){};
    }
    if (typeof HTMLCanvasElement.prototype.requestPointerLock !== "function") {
      HTMLCanvasElement.prototype.requestPointerLock = function(){};
    }

    // IME köprüsü
    const IME = document.getElementById('ime');
    window.IME = IME; // C++ EM_ASM erişimi

    function focusCanvas(){ canvas.focus({ preventScroll:true }); }
    canvas.addEventListener('mouseenter', focusCanvas);
    canvas.addEventListener('mousedown',  focusCanvas);
    canvas.addEventListener('touchstart', focusCanvas, { passive:true });

    // IME -> C++
    IME.addEventListener('input', () => {
      const s = IME.value;
      if (s && window.Module && Module.ccall) {
        Module.ccall('ime_send', null, ['string'], [s]);
        IME.value = '';
      }
    });
    IME.addEventListener('keydown', (e)=>{ if (e.key === 'Enter') IME.blur(); });
    ['touchstart','mousedown'].forEach(ev =>
      document.addEventListener(ev, (e)=>{
        if (document.activeElement === IME && e.target !== IME) IME.blur();
      }, {passive:true})
    );

    // Tek Module tanımı
    window.Module = {
      canvas,
      locateFile: (p)=>p, // wasm ve js aynı klasörde
      onRuntimeInitialized(){ canvas.focus({preventScroll:true}); },
      print: (t)=>console.log(t),
      printErr: (t)=>console.error(t),
    };
  </script>
  <script>
  (function(){
    // basit cihaz tespiti: ekran eni 768px altı ise "mobil" varsay
    const isMobile = window.matchMedia("(max-width: 768px)").matches;

    if (isMobile) {
      const box = document.createElement('div');
      box.id = 'mobileErrorBox';
      box.style.cssText = `
        position:fixed;bottom:0;left:0;right:0;
        background:rgba(200,0,0,0.9);color:#fff;
        font:12px/1.4 monospace;padding:6px;z-index:9999;
        max-height:40vh;overflow:auto;white-space:pre-wrap;
      `;
      document.body.appendChild(box);

      function showErr(msg, src, line, col, err) {
        const txt = `[JS ERROR] ${msg}\n${src||''}:${line||''}:${col||''}\n${err?err.stack||'':''}`;
        box.textContent += txt + "\n\n";
      }

      window.onerror = showErr;
      window.onunhandledrejection = e => {
        box.textContent += "[PROMISE REJECTED] " + (e.reason?.stack || e.reason) + "\n\n";
      };
    }
  })();
  </script>

  <!-- WASM/JS -->
  <script src="./t0kenumbers.js?v=1"></script>
</body>
</html>
