<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>t0kenplay</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html,body { margin:0; height:100%; background:#000; }
    canvas { width:100%; height:100%; display:block; }
  </style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

  <script>
    // Emscripten runtime bu Module objesini kullanacak
    var Module = {
      canvas: (function(){ return document.getElementById('canvas'); })(),
      setStatus: function(){},   // status bar’ı kapat
      print: function(){},       // output textarea yok
      monitorRunDependencies: function(){},
    };
    // İstersen WebGL context-loss uyarısını da kaldır:
    Module.canvas.addEventListener('webglcontextlost', function(e){ e.preventDefault(); }, false);
  </script>
  <script src="tokenplay.js"></script>
</body>
</html>
