<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>t0kenumbers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <style>
    html, body { margin:0; height:100%; background:#000; }
    #canvas { display:block; width:100%; height:100%; touch-action:none; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    // Canvas + DPR responsive boyutlandırma
    const canvas = document.getElementById('canvas');
    function fitCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const w = Math.max(document.documentElement.clientWidth, window.innerWidth || 0);
      const h = Math.max(document.documentElement.clientHeight, window.innerHeight || 0);
      canvas.style.width = "100%";
      canvas.style.height = "100%";
      canvas.width  = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
    }
    window.addEventListener('resize', fitCanvas);
    window.addEventListener('orientationchange', fitCanvas);
    fitCanvas();

    // iOS/Android’de kaydırma/zoom jestlerini kapat
    ['touchstart','touchmove','touchend','gesturestart','gesturechange','gestureend'].forEach(ev =>
      document.addEventListener(ev, e => e.preventDefault(), { passive:false })
    );

    // WebGL context kaybı durumunda sayfayı yenile
    canvas.addEventListener('webglcontextlost',  e => { e.preventDefault(); }, false);
    canvas.addEventListener('webglcontextrestored', () => { location.reload(); }, false);

    // Emscripten Module konfigürasyonu (WebGL2, yüksek performans)
    var Module = {
      canvas: canvas,
      locateFile: function (path) {
        if (path.endsWith('.wasm')) return 'tokenplay.wasm';
        return path;
      },
      // WebGL2 tercihleri (iOS/mobile uyumu için uygun ayarlar)
      webglContextAttributes: {
        alpha: false,
        antialias: false,
        depth: true,
        stencil: false,
        preserveDrawingBuffer: false,
        powerPreference: 'high-performance',
        majorVersion: 2,   // WebGL2
        minorVersion: 0
      }
    };
  </script>

  <!-- Derlediğin çıktı: tokenplay.js (aynı klasörde) -->
  <script src="tokenplay.js"></script>
</body>
</html>
