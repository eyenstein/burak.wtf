<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>burak.wtf</title>
<style>
  html, body { height:100%; margin:0; background:#fff; }
  body { display:flex; align-items:center; justify-content:center; font-family:Helvetica, Arial, sans-serif; }
  .stage {
    position: relative;
    width: 100vw; height: 80vh;  /* çember için daha yüksek alan */
    overflow: hidden;
  }
  .ring { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); }
  .ch {
    position:absolute; top:0; left:0;
    line-height:1; color:#000; white-space:pre;
    transform-origin:50% 60%;   /* teğet dönerken daha doğal */
    will-change: transform, opacity;
  }

  /* Üst/alt bant yazıları */
  .top-note, .bottom-note{
    position:absolute; left:50%; transform:translateX(-50%);
    font-size:14px; letter-spacing:0.04em; color:#000;
    opacity:0.8; user-select:none;
  }
  .top-note{ top:10px; }
  .bottom-note{ bottom:10px; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="top-note">burak.wtf · full circle demo</div>
    <div id="ring" class="ring"></div>
    <div class="bottom-note">press 0/1 to change speed · R to reverse</div>
  </div>

<script>
  // ====== AYARLAR ======
  const TEXT = "d o n't   m i n d ,   j u s t   h a v i n g   f u n    ";
  const RADIUS_FACTOR = 0.36;     // tam çember için biraz daha küçük yarıçap
  const BASE_FONT     = 48;       // başlangıç fontu (otomatik ölçeklenecek)
  let   SPEED_PX      = 60;       // piksel/sn (klavyeyle değişir)
  const FILL          = 0.98;     // çemberin yüzde kaçı dolsun (0.90–0.99 önerilir)
  const USE_DEPTH     = false;    // true yaparsan hafif yakın/uzak ölçek uygular
  // ======================

  const stage = document.getElementById('stage');
  const ring  = document.getElementById('ring');

  function layout() {
    ring.innerHTML = "";

    const W = innerWidth, H = innerHeight;
    const R = Math.min(W, H) * RADIUS_FACTOR;        // yarıçap
    const L = 2 * Math.PI * R * FILL;                // kullanılacak çevre uzunluğu
    const chars = [...TEXT];

    // --- 1) harf genişliklerini ölç ---
    const meas = document.createElement('span');
    Object.assign(meas.style, {
      position:'absolute', visibility:'hidden', whiteSpace:'pre',
      fontFamily:'Helvetica, Arial, sans-serif', fontSize: BASE_FONT+'px'
    });
    document.body.appendChild(meas);

    const widths = chars.map(c => { meas.textContent = c; return meas.offsetWidth || 0; });
    const sumWidth = widths.reduce((a,b)=>a+b,0);
    const fontScale = (sumWidth === 0) ? 1 : (L / sumWidth);
    const fontPx = BASE_FONT * fontScale;
    document.body.removeChild(meas);

    // --- 2) span'ları yarat ---
    const spans = chars.map(c => {
      const s = document.createElement('span');
      s.className = 'ch';
      s.textContent = c;
      s.style.fontSize = fontPx + 'px';
      ring.appendChild(s);
      return s;
    });

    // --- 3) ölçeklenmiş genişlikleri ölç ---
    const meas2 = document.createElement('span');
    Object.assign(meas2.style, {
      position:'absolute', visibility:'hidden', whiteSpace:'pre',
      fontFamily:'Helvetica, Arial, sans-serif', fontSize: fontPx+'px'
    });
    document.body.appendChild(meas2);
    const w2 = chars.map(c => { meas2.textContent = c; return meas2.offsetWidth || 0; });
    document.body.removeChild(meas2);

    // --- 4) merkezden merkeze lineer konumlar ---
    const centers = [];
    let acc = 0;
    for (let i=0; i<chars.length; i++){
      const prevW = (i===0)?0:w2[i-1];
      acc += (prevW/2) + (w2[i]/2);
      centers.push(acc);
    }
    const totalLen = centers[centers.length-1] + w2[w2.length-1]/2;

    // --- 5) animasyon ---
    let phase = 0; // 0..totalLen
    let lastTs = performance.now();

    function frame(ts){
      const dt = (ts - lastTs)/1000; lastTs = ts;
      phase = (phase + SPEED_PX * dt) % totalLen;

      for (let i=0; i<spans.length; i++){
        // 0..totalLen aralığında bir konum + faz
        let s = (centers[i] + phase) % totalLen;
        // -totalLen/2 .. +totalLen/2 aralığına merkezle
        s -= totalLen / 2;

        // lineer s → açı (radyan)
        const theta = s / R; // ~ -π*FILL .. +π*FILL

        // TAM ÇEMBER konumlandırma (ekran düzleminde)
        const x = R * Math.cos(theta);
        const y = R * Math.sin(theta);

        // Teğete hizalama: tangent açısı = theta + 90°
        const rotZdeg = (theta + Math.PI/2) * 180/Math.PI;

        // İsteğe bağlı hafif derinlik (üstte küçük, altta büyük gibi)
        const depthScale = USE_DEPTH ? (0.9 + 0.2 * (1 + Math.sin(theta))/2) : 1;

        spans[i].style.transform = `
          translate(${x}px, ${y}px)
          rotateZ(${rotZdeg}deg)
          scale(${depthScale})
        `;
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  layout();
  addEventListener('resize', layout);

  // --- Klavye kontrolleri ---
  addEventListener('keydown', e => {
    if (e.key === '0') { SPEED_PX = Math.max(10, SPEED_PX - 10); } // yavaşlat
    if (e.key === '1') { SPEED_PX += 10; }                         // hızlandır
    if (e.key.toLowerCase() === 'r') { SPEED_PX *= -1; }           // yön ters
  });
</script>
</body>
</html>
