<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>burak.wtf — 2D dark space, rotating ring+halo</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  html, body { margin:0; padding:0; height:100%; background:#000; }
  body {
    display:flex; align-items:center; justify-content:center;
    font-family: Helvetica, Arial, sans-serif;
    min-height: -webkit-fill-available;
    color:#fff;
  }
  .stage { position:fixed; inset:0; overflow:hidden; touch-action:none; }
  .note {
    position: fixed; left:50%; bottom: calc(env(safe-area-inset-bottom) + 12px);
    transform: translateX(-50%);
    font-size: 12px; opacity: .7; user-select:none; text-align:center;
  }
</style>
</head>
<body>
<canvas id="c" class="stage"></canvas>
<div class="note">drag = yaw/pitch • wheel/pinch = zoom</div>

<script type="module">
/* three.js */
import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
/* 2B hissi için derinlik minimum, ama etkileşim aynı kalsın */
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.01, 100);
camera.position.set(0, 0, 3);

/* === SADECE ring + ona yapışık HALO birlikte döner === */
const ringGroup = new THREE.Group();
scene.add(ringGroup);

/* === Ring Shader === */
const planeGeo = new THREE.PlaneGeometry(2, 2, 1, 1);

const ringMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,        // ışık gibi eklensin
  uniforms: {
    uTime: { value: 0 },
    uRadius: { value: 0.42 },
    uWidth: { value: 2.5 },
    uGain: { value: 1.0 },
    uBrightness: { value: 1.0 },
    uRingColor: { value: new THREE.Color('#ffffff') },  // ışık çizgisi beyaz
    uInnerColor: { value: new THREE.Color('#BDB76B') }, // DarkKhaki (haki)
    uInnerStrength: { value: 0.55 },  // iç dolgu gücü
    uHaloStrength: { value: 0.9 },    // dış halo gücü
    uHaloSoftness: { value: 2.6 },    // yayılım yumuşaklığı
  },
  vertexShader: /* glsl */`
    varying vec2 vUv;
    void main(){
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: /* glsl */`
    precision highp float;
    varying vec2 vUv;

    uniform float uTime;
    uniform float uRadius;
    uniform float uWidth;
    uniform float uGain;
    uniform float uBrightness;
    uniform vec3  uRingColor;
    uniform vec3  uInnerColor;
    uniform float uInnerStrength;
    uniform float uHaloStrength;
    uniform float uHaloSoftness;

    void main(){
      // siyah arka plan üstünde ışık ekleyeceğiz
      vec3 base = vec3(0.0);

      // merkez ve yarıçap
      vec2 p = vUv - 0.5;
      float r = length(p) * 2.0;

      // --- RING (yumuşak kenarlı bant) ---
      float innerEdge = smoothstep(uRadius - (1.0/uWidth), uRadius, r);
      float outerEdge = 1.0 - smoothstep(uRadius, uRadius + (1.0/uWidth), r);
      float ringBand  = innerEdge * outerEdge;

      // --- İÇ KHAKI HAZE (tamamen yumuşak) ---
      float innerFill = smoothstep(uRadius, 0.0, r);                      // merkeze doğru artar
      float innerSoft = exp(-pow((uRadius - r) * (uWidth*0.6), 2.0));     // band yakınında güçlendirme
      float innerHaze = clamp(innerFill * innerSoft, 0.0, 1.0);

      // --- DIŞ HALO (ring dışına doğru yumuşak yayılım) ---
      float halo = exp(-pow((r - uRadius) * uHaloSoftness, 2.0));

      // --- Karışım & parlaklık ---
      float aRing  = ringBand;
      float aInner = innerHaze * uInnerStrength;
      float aHalo  = halo * uHaloStrength * 0.6;

      float a = (aRing + aInner + aHalo) * uGain * clamp(uBrightness, 0.0, 1.0);
      a = clamp(a, 0.0, 1.0);

      // renkler (siyah tabana ekleniyor)
      vec3 col = base;
      col += uRingColor * aRing * 1.0;
      col += uInnerColor * aInner * 0.8;
      col += (uInnerColor * 0.9 + vec3(0.1)) * aHalo * 0.5;

      gl_FragColor = vec4(col, a);
      if (gl_FragColor.a < 0.001) discard;
    }
  `
});

/* ring + ona yapışık halo: aynı shader ama biraz büyük */
const ringMesh = new THREE.Mesh(planeGeo, ringMat);
ringMesh.renderOrder = 2;
ringGroup.add(ringMesh);

const haloMat = ringMat.clone();
haloMat.uniforms = THREE.UniformsUtils.clone(ringMat.uniforms);
haloMat.uniforms.uHaloStrength.value = 1.0;
haloMat.uniforms.uHaloSoftness.value = 2.2;
haloMat.uniforms.uInnerStrength.value = 0.38;

const haloMesh = new THREE.Mesh(new THREE.PlaneGeometry(3.2, 3.2), haloMat);
haloMesh.position.set(0, 0, -0.002);
haloMesh.renderOrder = 1;
ringGroup.add(haloMesh);

/* === GENİŞ AMBIENT BACKDROP: UZAY SABİT KALSIN ===
   - ringGroup'a eklemiyoruz
   - her frame kameraya bakacak (billboard) => 2B sabit arka plan hissi */
const ambientMat = ringMat.clone();
ambientMat.uniforms = THREE.UniformsUtils.clone(ringMat.uniforms);
ambientMat.uniforms.uRadius.value = 0.46;
ambientMat.uniforms.uWidth.value = 1.8;
ambientMat.uniforms.uInnerStrength.value = 0.22;
ambientMat.uniforms.uHaloStrength.value = 0.7;
ambientMat.uniforms.uHaloSoftness.value = 1.8;

const ambientMesh = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), ambientMat);
ambientMesh.position.set(0, 0, -0.01);
ambientMesh.renderOrder = 0;
scene.add(ambientMesh); // <- RING GROUP’A DEĞİL

/* === Etkileşim === */
let yaw = 0, pitch = 0;
let isDown = false, lastX = 0, lastY = 0;
let distance = 3;

const getXY = (e)=>('touches' in e ? [e.touches[0].clientX, e.touches[0].clientY] : [e.clientX, e.clientY]);
const onPointerDown = (e)=>{ isDown = true; [lastX,lastY] = getXY(e); };
const onPointerMove = (e)=>{
  if (!isDown) return;
  const [x,y] = getXY(e);
  const dx = (x - lastX) / innerWidth;
  const dy = (y - lastY) / innerHeight;
  lastX = x; lastY = y;
  yaw   -= dx * Math.PI;
  pitch -= dy * Math.PI * 0.7;
  pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
};
const onPointerUp = ()=>{ isDown = false; };

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('mouseleave', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive:true });
canvas.addEventListener('touchmove', onPointerMove, { passive:true });
canvas.addEventListener('touchend', onPointerUp);

addEventListener('wheel', (e)=>{
  distance += Math.sign(e.deltaY) * 0.15;
  distance = Math.max(1.4, Math.min(6.0, distance));
}, { passive:true });

let pinchStart = 0;
canvas.addEventListener('touchstart', (e)=>{
  if (e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStart = Math.hypot(dx, dy);
  }
}, { passive:true });
canvas.addEventListener('touchmove', (e)=>{
  if (e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d  = Math.hypot(dx, dy);
    const s  = (pinchStart > 0) ? (pinchStart / d) : 1.0;
    distance = THREE.MathUtils.clamp(distance * s, 1.4, 6.0);
    pinchStart = d;
  }
}, { passive:true });

/* === Resize === */
addEventListener('resize', ()=>{
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

/* === Animate === */
const clock = new THREE.Clock();
function tick(){
  const t = clock.getElapsedTime();

  // sadece RING+HALO döner
  ringGroup.rotation.set(pitch, yaw, 0);

  // kamera / 2B sabit arka plan
  camera.position.set(0, 0, distance);
  camera.lookAt(0, 0, 0);

  // ambient arka plakayı kameraya kilitle (billboard) — uzay sabit
  ambientMesh.quaternion.copy(camera.quaternion);

  // hafif nefes
  const breathe = 0.02 * Math.sin(t * 0.6);
  ringMat.uniforms.uBrightness.value = 1.0 + breathe;
  haloMat.uniforms.uBrightness.value = 1.0 + breathe;
  ambientMat.uniforms.uBrightness.value = 1.0 + breathe;

  ringMat.uniforms.uTime.value = t;
  haloMat.uniforms.uTime.value = t;
  ambientMat.uniforms.uTime.value = t;

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
